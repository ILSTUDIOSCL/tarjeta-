<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoyaltyOS — Registro</title>

  <!-- ═══════════════════════════════════════════════
       SUPABASE JS desde CDN
  ════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ═══════════════════════════════════════════════
       FUENTES: Syne (display) + DM Sans (body)
  ════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       VARIABLES & RESET
    ════════════════════════════════════════════════ */
    :root {
      --bg:         #080b0f;
      --surface:    #0e1318;
      --border:     rgba(255,255,255,.07);
      --green:      #00ff88;
      --green-dim:  rgba(0,255,136,.12);
      --green-glow: rgba(0,255,136,.35);
      --text:       #e8edf2;
      --muted:      #5a6470;
      --error:      #ff4d6d;
      --error-dim:  rgba(255,77,109,.12);
      --radius:     14px;
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       RUIDO AMBIENTAL DE FONDO
    ════════════════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% -10%, rgba(0,255,136,.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 100% 80%, rgba(0,255,136,.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Patrón de puntos sutil */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════════
       WRAPPER PRINCIPAL
    ════════════════════════════════════════════════ */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeUp .6s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════
       LOGO / MARCA
    ════════════════════════════════════════════════ */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--green);
      display: grid;
      place-items: center;
      box-shadow: 0 0 16px var(--green-glow);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -.02em;
      color: var(--text);
    }

    .brand-tag {
      font-size: .65rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-left: 2px;
    }

    /* ═══════════════════════════════════════════════
       ENCABEZADO
    ════════════════════════════════════════════════ */
    .heading {
      margin-bottom: 28px;
    }

    .heading h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 5vw, 1.9rem);
      letter-spacing: -.03em;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .heading h1 span {
      color: var(--green);
      text-shadow: 0 0 24px var(--green-glow);
    }

    .heading p {
      font-size: .875rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* ═══════════════════════════════════════════════
       TARJETA / CARD
    ════════════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 24px 48px rgba(0,0,0,.5);
    }

    /* ═══════════════════════════════════════════════
       CAMPOS DEL FORMULARIO
    ════════════════════════════════════════════════ */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 7px;
      transition: color var(--transition);
    }

    /* Etiqueta activa */
    .field:focus-within label {
      color: var(--green);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
      pointer-events: none;
      transition: color var(--transition);
    }

    .field:focus-within .input-wrap svg {
      color: var(--green);
    }

    input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 400;
      outline: none;
      transition:
        border-color var(--transition),
        background var(--transition),
        box-shadow var(--transition);
      -webkit-appearance: none;
    }

    input::placeholder {
      color: rgba(255,255,255,.18);
    }

    /* Foco */
    input:focus {
      border-color: rgba(0,255,136,.4);
      background: rgba(0,255,136,.04);
      box-shadow: 0 0 0 3px rgba(0,255,136,.08);
    }

    /* Estado de error en campo */
    input.is-error {
      border-color: rgba(255,77,109,.5);
      box-shadow: 0 0 0 3px rgba(255,77,109,.08);
    }

    /* ═══════════════════════════════════════════════
       SEPARADOR DECORATIVO
    ════════════════════════════════════════════════ */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
      position: relative;
    }

    /* ═══════════════════════════════════════════════
       BOTÓN PRINCIPAL
    ════════════════════════════════════════════════ */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        opacity var(--transition);
      letter-spacing: .01em;
    }

    /* Efecto shimmer en hover */
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.3) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .btn-primary:hover::before {
      transform: translateX(100%);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 28px var(--green-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    /* Texto e ícono del botón */
    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ═══════════════════════════════════════════════
       SPINNER DE CARGA
    ════════════════════════════════════════════════ */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .is-loading .spinner { display: block; }
    .is-loading .btn-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ═══════════════════════════════════════════════
       MENSAJES DE FEEDBACK
    ════════════════════════════════════════════════ */
    .feedback {
      margin-top: 16px;
      border-radius: 9px;
      padding: 12px 14px;
      font-size: .83rem;
      display: none;
      align-items: flex-start;
      gap: 9px;
      animation: popIn .3s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .feedback.show { display: flex; }

    .feedback.success {
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,.2);
      color: var(--green);
    }

    .feedback.error {
      background: var(--error-dim);
      border: 1px solid rgba(255,77,109,.2);
      color: var(--error);
    }

    .feedback svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ═══════════════════════════════════════════════
       FOOTER DEL CARD
    ════════════════════════════════════════════════ */
    .card-footer {
      margin-top: 20px;
      text-align: center;
      font-size: .78rem;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
      transition: opacity var(--transition);
    }

    .card-footer a:hover { opacity: .75; }

    /* ═══════════════════════════════════════════════
       BADGES NEGOCIO (decorativos, abajo del card)
    ════════════════════════════════════════════════ */
    .biz-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: .72rem;
      color: var(--muted);
      background: rgba(255,255,255,.02);
      letter-spacing: .03em;
    }

    .badge svg {
      width: 12px;
      height: 12px;
      opacity: .5;
    }

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- ── MARCA ──────────────────────────────────── -->
  <div class="brand">
    <div class="brand-icon">
      <!-- Ícono: estrella de fidelización -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"
              fill="#000" stroke="#000" stroke-width=".5"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Ilstudios</div>
      <div class="brand-tag">Fidelización inteligente</div>
    </div>
  </div>

  <!-- ── ENCABEZADO ─────────────────────────────── -->
  <div class="heading">
    <h1>Únete y empieza<br />a <span>ganar recompensas</span></h1>
    <p>Regístrate una sola vez y acumula puntos en tus lugares favoritos.</p>
  </div>

  <!-- ── TARJETA / FORMULARIO ───────────────────── -->
  <div class="card">
    <form id="registerForm" novalidate>

      <!-- Campo: Nombre -->
      <div class="field" id="fieldNombre">
        <label for="nombre">Nombre completo</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input type="text" id="nombre" name="nombre"
                 placeholder="Ej. María González" autocomplete="name" />
        </div>
      </div>

      <!-- Campo: Teléfono -->
      <div class="field" id="fieldTelefono">
        <label for="telefono">Teléfono</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.6 10.8a15.7 15.7 0 006.6 6.6l2.2-2.2a1 1 0 011-.25 11.4 11.4 0 003.6.6
                     1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1
                     11.4 11.4 0 00.6 3.6 1 1 0 01-.25 1z"/>
          </svg>
          <input type="tel" id="telefono" name="telefono"
                 placeholder="+56 9 1234 5678" autocomplete="tel" />
        </div>
      </div>

      <!-- Campo: Email -->
      <div class="field" id="fieldEmail">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input type="email" id="email" name="email"
                 placeholder="hola@ejemplo.com" autocomplete="email" />
        </div>
      </div>

      <div class="divider"></div>

      <!-- Botón de registro -->
      <button type="submit" class="btn-primary" id="submitBtn">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-text">Crear mi cuenta gratis →</span>
        </div>
      </button>

      <!-- Mensaje de feedback (éxito / error) -->
      <div class="feedback" id="feedback" role="alert" aria-live="polite">
        <svg id="feedbackIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        <span id="feedbackMsg"></span>
      </div>

    </form>

    <!-- Footer del card -->
    <p class="card-footer">
      ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
    </p>
  </div>

  <!-- ── BADGES DECORATIVOS ─────────────────────── -->
  <div class="biz-badges">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/>
        <line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      Cafeterías
    </div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11l19-9-9 19-2-8-8-2z"/>
      </svg>
      Restaurantes
    </div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
      Barberías
    </div>
  </div>

</div><!-- /wrapper -->

<!-- ═══════════════════════════════════════════════
     JAVASCRIPT: Supabase + Validación + UX
════════════════════════════════════════════════ -->
<script>
  /* ──────────────────────────────────────────────
     1. INICIALIZAR SUPABASE
  ────────────────────────────────────────────── */
  const SUPABASE_URL    = 'https://epesiqslzlwelbcgkqxi.supabase.co';
  const SUPABASE_ANON   = 'sb_publishable_1VQKC31KHETg9z33Sq-dAQ_EkDQuNJO';
  const NEGOCIO_ID      = 'b8431f9a-706f-4a13-bd7a-8c256dda127d'; // UUID de ejemplo

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  /* ──────────────────────────────────────────────
     2. REFERENCIAS AL DOM
  ────────────────────────────────────────────── */
  const form       = document.getElementById('registerForm');
  const submitBtn  = document.getElementById('submitBtn');
  const feedback   = document.getElementById('feedback');
  const feedbackMsg  = document.getElementById('feedbackMsg');
  const feedbackIcon = document.getElementById('feedbackIcon');

  const inputs = {
    nombre:   document.getElementById('nombre'),
    telefono: document.getElementById('telefono'),
    email:    document.getElementById('email'),
  };

  /* ──────────────────────────────────────────────
     3. HELPERS DE UI
  ────────────────────────────────────────────── */

  /** Muestra u oculta el estado de carga */
  function setLoading(state) {
    submitBtn.disabled = state;
    submitBtn.classList.toggle('is-loading', state);
  }

  /** Muestra un mensaje de feedback */
  function showFeedback(type, message) {
    feedback.className = `feedback show ${type}`;
    feedbackMsg.textContent = message;

    // Íconos SVG según tipo
    const icons = {
      success: '<circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/>',
      error:   '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    };
    feedbackIcon.innerHTML = icons[type] || '';
  }

  /** Limpia los estados de error en los inputs */
  function clearErrors() {
    Object.values(inputs).forEach(el => el.classList.remove('is-error'));
    feedback.className = 'feedback';
  }

  /* ──────────────────────────────────────────────
     4. VALIDACIÓN
  ────────────────────────────────────────────── */
  function validate() {
    let ok = true;

    // Nombre: obligatorio y mínimo 2 chars
    if (inputs.nombre.value.trim().length < 2) {
      inputs.nombre.classList.add('is-error');
      ok = false;
    }

    // Teléfono: solo dígitos, +, espacios, guiones, mínimo 7 chars
    const telClean = inputs.telefono.value.trim();
    if (!/^[+\d\s\-()]{7,}$/.test(telClean)) {
      inputs.telefono.classList.add('is-error');
      ok = false;
    }

    // Email: formato básico
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(inputs.email.value.trim())) {
      inputs.email.classList.add('is-error');
      ok = false;
    }

    return ok;
  }

  /* ──────────────────────────────────────────────
     5. LIMPIAR ERRORES al tipear
  ────────────────────────────────────────────── */
  Object.values(inputs).forEach(input => {
    input.addEventListener('input', () => {
      input.classList.remove('is-error');
    });
  });

  /* ──────────────────────────────────────────────
     6. ENVÍO DEL FORMULARIO
  ────────────────────────────────────────────── */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    // Validar antes de enviar
    if (!validate()) {
      showFeedback('error', 'Por favor completa todos los campos correctamente.');
      return;
    }

    setLoading(true);

    try {
      // Insertar en la tabla "clientes" de Supabase
      const { error } = await db
        .from('clientes')
        .insert([{
          nombre:     inputs.nombre.value.trim(),
          telefono:   inputs.telefono.value.trim(),
          email:      inputs.email.value.trim().toLowerCase(),
          negocio_id: NEGOCIO_ID,
        }]);

      if (error) throw error;

      // ¡Éxito!
      showFeedback('success', '¡Cuenta creada! Bienvenido/a al programa de fidelización 🎉');
      form.reset();

    } catch (err) {
      console.error('Supabase error:', err);

      // Error de email duplicado
      const msg = err?.message || '';
      if (msg.includes('duplicate') || msg.includes('unique')) {
        showFeedback('error', 'Este correo ya está registrado. Prueba con otro.');
      } else {
        showFeedback('error', 'Ocurrió un error al registrarse. Intenta de nuevo.');
      }

    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
